<!DOCTYPE html>
<html>
<head>
    <title>Pictionary Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #e0e0e0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #status-bar { background: #333; color: white; padding: 5px; text-align: center; font-size: 12px; font-weight: bold; width: 100%; z-index: 20; }
        
        /* Viewer Overlay Styles */
        #viewer-overlay { display: none; background: #2c3e50; color: white; padding: 40px 20px; text-align: center; z-index: 20; width: 100%; height: 100vh; box-sizing: border-box; }
        #viewer-overlay h2 { margin-top: 0; font-size: 24px; color: #ff4d4d; }
        #viewer-overlay p { font-size: 18px; line-height: 1.5; font-weight: bold; }
        
        #canvas-container { flex: 1; overflow: hidden; position: relative; background: white; touch-action: none; width: 100%; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #toolbar { background: white; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.15); z-index: 10; border-top: 1px solid #ccc; width: 100%; box-sizing: border-box; flex-shrink: 0; }
        button, select, input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; font-size: 14px; cursor: pointer; }
        input[type="color"] { width: 40px; height: 40px; padding: 0; cursor: pointer; border: none; border-radius: 50%; overflow: hidden; }
        input[type="range"] { width: 100px; }
    </style>
</head>
<body>
    <div id="status-bar">Sync Status: <span id="syncText">🟡 Waiting...</span></div>
    
    <div id="viewer-overlay">
        <h2>👁️ VIEWER MODE</h2>
        <p>You cannot draw!</p>
        <p>Please close this menu and watch the drawing update live in the group chat!</p>
    </div>
    
    <div id="canvas-container">
        <canvas id="board"></canvas>
    </div>
    
    <div id="toolbar">
        <input type="color" id="colorPicker" value="#000000">
        <input type="range" id="brushSize" min="1" max="30" value="5">
        <select id="toolSelect">
            <option value="solid">Solid Brush</option>
            <option value="airbrush">Airbrush</option>
            <option value="eraser">Eraser</option>
            <option value="line">Straight Line</option>
            <option value="rect">Rectangle</option>
            <option value="circle">Circle</option>
        </select>
        <button id="undoBtn">↩️ Undo</button>
        <button id="redoBtn">↪️ Redo</button>
        <button id="clearBtn" style="background: #ff4d4d; color: white; border: none;">🗑️ Clear</button>
    </div>

    <script>
        // ⚠️ PASTE YOUR BOT TOKEN HERE TO SYNC DIRECTLY TO TELEGRAM
        const BOT_TOKEN = "8447617103:AAGBp9kIwxwm7DVbavWPm1iMQIbt5YjCsHg"; 
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        
        const startParam = tg.initDataUnsafe?.start_param || "0_0_0";
        const params = startParam.split("_");
        const chatId = params[0];
        const drawerId = parseInt(params[1]); 
        const messageId = params[2]; 
        
        const actualUserId = tg.initDataUnsafe?.user?.id || 0; 
        const isDrawer = (actualUserId === drawerId || actualUserId === 0); 

        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const syncText = document.getElementById('syncText');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.getElementById('toolbar').offsetHeight - 25;
        
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // --- UNDO / REDO LOGIC ---
        let history = [canvas.toDataURL()];
        let historyStep = 0;

        function saveState() {
            historyStep++;
            history = history.slice(0, historyStep);
            history.push(canvas.toDataURL());
        }

        function restoreState() {
            let img = new Image();
            img.src = history[historyStep];
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            }
        }

        document.getElementById('undoBtn').onclick = () => {
            if(historyStep > 0) {
                historyStep--;
                restoreState();
            }
        };

        document.getElementById('redoBtn').onclick = () => {
            if(historyStep < history.length - 1) {
                historyStep++;
                restoreState();
            }
        };
        
        document.getElementById('clearBtn').onclick = () => { 
            ctx.fillStyle = "white"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
            saveState(); 
        };

        // --- DIRECT TELEGRAM API SYNC ---
        function dataURLtoFile(dataurl, filename) {
            let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1];
            let bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            while(n--) u8arr[n] = bstr.charCodeAt(n);
            return new File([u8arr], filename, {type:mime});
        }

        if (!isDrawer) {
            // Viewers get the friendly screen telling them to watch the chat
            document.getElementById('toolbar').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'none';
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('viewer-overlay').style.display = 'block';
        } else {
            initDrawing();
            initZoom();
            
            // Drawer sync loop: Updated to 20 seconds
            setInterval(() => {
                if (BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") {
                    syncText.innerText = "🔴 Add Token to Code!";
                    return;
                }

                syncText.innerText = "🟡 Sending...";
                const file = dataURLtoFile(canvas.toDataURL('image/jpeg', 0.6), 'drawing.jpg');
                
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('message_id', messageId);
                
                const mediaObj = {
                    type: 'photo',
                    media: 'attach://drawing',
                    caption: "<b>Live Drawing...</b> 🖌️",
                    parse_mode: "HTML",
                    reply_markup: {
                        inline_keyboard: [
                            [{text: "See your word 🔍", callback_data: "see"}, {text: "Open Canvas 🎨", url: `https://t.me/Crocootestbot/CrocodileGame?startapp=${chatId}_${drawerId}_${messageId}`}],
                            [{text: "Next", callback_data: "next"}, {text: "Cancel ❌", callback_data: "cancel_game"}]
                        ]
                    }
                };

                formData.append('media', JSON.stringify(mediaObj));
                formData.append('drawing', file);

                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/editMessageMedia`, {
                    method: 'POST',
                    body: formData
                })
                .then(r => r.json())
                .then(data => {
                    if(data.ok) syncText.innerText = "🟢 Live (Sent to Chat!)";
                    else if(data.description && data.description.includes("not modified")) syncText.innerText = "🟢 No Changes Made";
                    else syncText.innerText = "🔴 API Error";
                })
                .catch(e => { syncText.innerText = "🔴 Network Error"; });
            }, 20000); // 20 SECONDS
        }

        // --- DRAWING LOGIC ---
        let drawing = false;
        let startX, startY;
        let tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
        let tempCtx = tempCanvas.getContext('2d');
        let scale = 1;

        function initDrawing() {
            container.addEventListener('pointerdown', (e) => {
                if (e.touches && e.touches.length > 1) return;
                drawing = true;
                const rect = canvas.getBoundingClientRect();
                startX = (e.clientX - rect.left) / scale;
                startY = (e.clientY - rect.top) / scale;
                tempCtx.drawImage(canvas, 0, 0); 
            });

            container.addEventListener('pointermove', (e) => {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const currentX = (e.clientX - rect.left) / scale;
                const currentY = (e.clientY - rect.top) / scale;
                let tool = document.getElementById('toolSelect').value;
                let color = tool === 'eraser' ? 'white' : document.getElementById('colorPicker').value;
                let size = document.getElementById('brushSize').value;

                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = size;
                ctx.lineCap = 'round';

                if (['solid', 'airbrush', 'eraser'].includes(tool)) {
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(currentX, currentY);
                    if(tool === 'airbrush') { ctx.shadowBlur = size * 2; ctx.shadowColor = color; } 
                    else { ctx.shadowBlur = 0; }
                    ctx.stroke();
                    startX = currentX; startY = currentY;
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(tempCanvas, 0, 0);
                    ctx.beginPath();
                    if (tool === 'line') { ctx.moveTo(startX, startY); ctx.lineTo(currentX, currentY); ctx.stroke(); }
                    if (tool === 'rect') { ctx.rect(startX, startY, currentX - startX, currentY - startY); ctx.stroke(); }
                    if (tool === 'circle') { ctx.arc(startX, startY, Math.abs(currentX - startX), 0, Math.PI * 2); ctx.stroke(); }
                }
            });

            container.addEventListener('pointerup', () => { if(drawing) { drawing = false; saveState(); ctx.shadowBlur = 0; } });
        }

        function initZoom() {
            let initialDistance = null;
            let initialScale = scale;

            container.addEventListener('touchstart', e => {
                if (e.touches.length === 2) {
                    drawing = false;
                    initialDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    initialScale = scale;
                    
                    // Set transform origin dynamically to the center of the pinch
                    if (scale === 1) {
                        let cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        let cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const rect = container.getBoundingClientRect();
                        canvas.style.transformOrigin = `${cx - rect.left}px ${cy - rect.top}px`;
                    }
                }
            });
            container.addEventListener('touchmove', e => {
                if (e.touches.length === 2 && initialDistance) {
                    e.preventDefault();
                    let currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    scale = Math.min(Math.max(1, initialScale * (currentDistance / initialDistance)), 3); 
                    canvas.style.transform = `scale(${scale})`;
                }
            });
            container.addEventListener('touchend', () => { initialDistance = null; });
        }
    </script>
</body>
</html>
